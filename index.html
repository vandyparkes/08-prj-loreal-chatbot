<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Vandy Parkes" />
    <title>L'Oréal — Smart Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <div class="brand-lockup">
          <img
            class="brand-logo"
            src="assets/loreal-logo.svg"
            width="200"
            height="35"
            alt="L'Oréal"
          />
          <h1 class="site-tagline">Smart Product Advisor</h1>
        </div>
      </header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div class="chat-toolbar">
            <button
              type="button"
              id="historyBtn"
              class="btn-history"
            >
              <span class="material-icons" aria-hidden="true">history</span>
              Conversation history
            </button>
          </div>
          <div id="chatWindow" class="chat-window">
            <div
              id="chatMessages"
              class="chat-messages"
              role="log"
              aria-live="polite"
              aria-relevant="additions"
            >
              <!-- user + assistant bubbles appended here via JS -->
            </div>
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <dialog
        id="historyDialog"
        class="history-dialog"
        aria-labelledby="historyDialogTitle"
      >
        <div class="history-dialog-panel">
          <div class="history-dialog-header">
            <h2 id="historyDialogTitle" class="history-dialog-title">
              Conversation history
            </h2>
            <button
              type="button"
              id="historyCloseBtn"
              class="history-dialog-close"
              aria-label="Close conversation history"
            >
              <span class="material-icons" aria-hidden="true">close</span>
            </button>
          </div>
          <div id="historyDialogBody" class="history-dialog-body"></div>
        </div>
      </dialog>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2026 L'Oréal. Student project.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
